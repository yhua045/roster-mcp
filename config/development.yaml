# Development configuration
api:
  base_url: "http://localhost:8000"
  timeout: 30
  retry_attempts: 3

scheduler:
  interval_hours: 1  # More frequent for development
  enabled: true
  timezone: "UTC"

ai:
  model: "gpt-3.5-turbo"
  temperature: 0.7
  max_tokens: 2000

logging:
  level: "DEBUG"
  file: "logs/roster-dev.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

features:
  dry_run: true
  auto_approve: false
  validation_strict: true

database:
  url: "sqlite:///roster-dev.db"
  echo: true  # Log SQL queries