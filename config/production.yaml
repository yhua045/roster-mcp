# Production configuration
api:
  base_url: "${ROSTER_API_BASE_URL}"
  timeout: 60
  retry_attempts: 5

scheduler:
  interval_hours: 24
  enabled: true
  timezone: "UTC"

ai:
  model: "${AI_MODEL:-gpt-4}"
  temperature: 0.5
  max_tokens: 3000

logging:
  level: "INFO"
  file: "logs/roster.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  max_bytes: 10485760  # 10MB
  backup_count: 5

features:
  dry_run: false
  auto_approve: false
  validation_strict: true

database:
  url: "${DATABASE_URL}"
  echo: false